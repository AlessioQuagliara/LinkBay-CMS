name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ── Backend: Laravel / PHPUnit ─────────────────────────────────────────────
  # Tests use SQLite :memory: (see backend/phpunit.xml) — no Postgres or Redis needed.
  backend-tests:
    name: Backend Tests (PHP 8.4)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, mbstring, dom, fileinfo, bcmath, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Validate migrations (SQLite in-memory sanity check)
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CENTRAL_DB_DRIVER: sqlite
          CENTRAL_DB_DATABASE: ':memory:'
          STRIPE_SECRET: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          TERMS_VERSION: test-v1

      - name: Run PHPUnit tests
        run: php artisan test --parallel

  # ── Backend: Vite / Filament assets ────────────────────────────────────────
  backend-assets:
    name: Backend Assets (Vite)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

  # ── Frontend: Next.js marketing site ───────────────────────────────────────
  frontend-build:
    name: Frontend Build (Next.js 16)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # remove once the codebase is lint-clean

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true  # remove once all type errors are resolved

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://app.linkbay-cms.com
