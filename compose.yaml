# =============================================================================
# compose.yaml — BASE / PRODUZIONE
# =============================================================================
# Usare da solo solo in produzione / staging:
#   docker compose -f compose.yaml up -d
#
# Per sviluppo locale aggiungere l'override:
#   docker compose -f compose.yaml -f compose.override.local.yml up -d
#
# Questo file NON contiene domini .test o localhost.
# Tutto ciò che è locale-only vive in compose.override.local.yml
# =============================================================================

services:

# ── Traefik ──────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6.2
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      # HTTPS — abilitare in produzione con certificato reale
      #- "--entrypoints.websecure.address=:443"
      #- "--certificatesresolvers.le.acme.tlschallenge=true"
      #- "--certificatesresolvers.le.acme.email=quagliara.alessio@outlook.com"
      #- "--certificatesresolvers.le.acme.storage=/acme.json"
    ports:
      - "80:80"
      #- "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./traefik/acme.json:/acme.json
    networks:
      - web

# ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: saas_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - web
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

# ── PHP-FPM (Laravel) ─────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_php
    restart: unless-stopped
    env_file:
      - .env
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_CONNECTION: central
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      # CENTRAL_DOMAIN: governa panelDomain(), RegisterController redirect,
      # Filament panel domain e Sanctum. In prod impostare nel root .env.
      CENTRAL_DOMAIN: ${CENTRAL_DOMAIN:-linkbay-cms.com}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-.linkbay-cms.com}
      # Stripe: le chiavi vengono dal root .env (APP_STRIPE_*) e vengono
      # rimappate ai nomi che Laravel config/services.php si aspetta.
      STRIPE_KEY: ${APP_STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET: ${APP_STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${APP_STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./backend:/var/www
      - laravel_storage:/var/www/storage
      - ./backend/public/filament:/var/www/public/filament
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web

# ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"
      # *.linkbay-cms.com → nginx (agency subdomain, tenant subdomain, app, admin)
      # Traefik v3 RE2 syntax — dots must be escaped, no named capture groups
      - "traefik.http.routers.prod-wildcard.rule=HostRegexp(`.+\\.linkbay-cms\\.com`)"
      - "traefik.http.routers.prod-wildcard.entrypoints=web"
      - "traefik.http.routers.prod-wildcard.service=nginx-svc"

# ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - nginx
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/eslint.config.mjs:/app/eslint.config.mjs
      - ./frontend/next-env.d.ts:/app/next-env.d.ts
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      # SSR runtime. Client-side NEXT_PUBLIC_* baked at build via frontend/.env.local
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://app.linkbay-cms.com}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend-prod.rule=Host(`linkbay-cms.com`) || Host(`www.linkbay-cms.com`)"
      - "traefik.http.routers.frontend-prod.entrypoints=web"
      - "traefik.http.routers.frontend-prod.service=frontend-svc"

# ── Node-RED ──────────────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: saas_nodered
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
    volumes:
      - nodered_data:/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nodered.rule=Host(`nodered.linkbay-cms.com`)"
      - "traefik.http.routers.nodered.entrypoints=web"
      - "traefik.http.services.nodered.loadbalancer.server.port=1880"

# ── TensorFlow Serving (opt-in) ───────────────────────────────────────────────
  tensorflow:
    image: tensorflow/serving:latest
    container_name: saas_tensorflow
    restart: unless-stopped
    profiles: ["ml"]
    environment:
      - MODEL_NAME=${TF_MODEL_NAME:-linkbay_model}
    volumes:
      - tensorflow_models:/models
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tensorflow.rule=Host(`tf.linkbay-cms.com`)"
      - "traefik.http.routers.tensorflow.entrypoints=web"
      - "traefik.http.services.tensorflow.loadbalancer.server.port=8501"

networks:
  web:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  laravel_storage:
  nodered_data:
  tensorflow_models:
