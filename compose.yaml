# =============================================================================
# root/compose.yaml
# =============================================================================

services:

# -------------------------------------------------------------------------------
# TRAEFIK - Reverse Proxy + Multi-domain automatico
# -------------------------------------------------------------------------------

  traefik:
    image: traefik:v3.6.2
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    # HTTPS (abilitare in produzione)
      #- "--entrypoints.websecure.address=:443"
      #- "--certificatesresolvers.le.acme.httpchallenge=true"
      #- "--certificatesresolvers.le.acme.httpchallenge.entrypoints=web"
      #- "--certificatesresolvers.le.acme.email=quagliara.alessio@outlook.com"
      #- "--certificatesresolvers.le.acme.storage=/acme.json"
    ports:
      - "80:80"
      #- "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      #- ./traefik/acme.json:/acme.json
    networks:
      - web

# -------------------------------------------------------------------------------
# POSTGRES - DB centrale + schemi per tenant
# -------------------------------------------------------------------------------

  db:
    image: postgres:16-alpine
    container_name: saas_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

# -------------------------------------------------------------------------------
# REDIS - Cache + Queue
# -------------------------------------------------------------------------------

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - web
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

# -------------------------------------------------------------------------------
# PHP-FPM - Laravel 11 Backend
# -------------------------------------------------------------------------------

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saas_php
    restart: unless-stopped
    env_file:
      - .env
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: central
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      CENTRAL_DOMAIN: ${CENTRAL_DOMAIN:-linkbay-cms.com}
    volumes:
      - ./backend:/var/www
      - laravel_storage:/var/www/storage
      - ./backend/public/filament:/var/www/public/filament
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - web

# -------------------------------------------------------------------------------
# NGINX - Web Server per Laravel (serve PHP-FPM)
# -------------------------------------------------------------------------------

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    volumes:
      - ./backend/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"
      # Tenant subdomains: *.linkbay-cms.com
      - "traefik.http.routers.tenant-api.rule=HostRegexp(`{subdomain:.+}.linkbay-cms.com`)"
      - "traefik.http.routers.tenant-api.entrypoints=web"
      - "traefik.http.routers.tenant-api.service=nginx-svc"
      # Central API
      - "traefik.http.routers.central-api.rule=Host(`api.linkbay-cms.com`) || Host(`api.localhost`)"
      - "traefik.http.routers.central-api.entrypoints=web"
      - "traefik.http.routers.central-api.service=nginx-svc"

# -------------------------------------------------------------------------------
# FRONTEND - Next.js Landing/Marketing
# -------------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - nginx
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/eslint.config.mjs:/app/eslint.config.mjs
      - ./frontend/next-env.d.ts:/app/next-env.d.ts
      - ./frontend/next.config.ts:/app/next.config.ts
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api.localhost}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend-local.rule=Host(`www.localhost`) || Host(`localhost`)"
      - "traefik.http.routers.frontend-local.entrypoints=web"
      - "traefik.http.routers.frontend-local.service=frontend-svc"
      - "traefik.http.routers.frontend-prod.rule=Host(`www.linkbay-cms.com`) || Host(`linkbay-cms.com`)"
      - "traefik.http.routers.frontend-prod.entrypoints=web"
      - "traefik.http.routers.frontend-prod.service=frontend-svc"

# -------------------------------------------------------------------------------
# NODE-RED - Automazioni visive (sostituisce n8n)
# -------------------------------------------------------------------------------

  nodered:
    image: nodered/node-red:latest
    container_name: saas_nodered
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET}
    volumes:
      - nodered_data:/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nodered.rule=Host(`nodered.localhost`) || Host(`nodered.linkbay-cms.com`)"
      - "traefik.http.routers.nodered.entrypoints=web"
      - "traefik.http.services.nodered.loadbalancer.server.port=1880"

# -------------------------------------------------------------------------------
# TENSORFLOW SERVING - Inference ML (sostituisce LiteLLM)
# -------------------------------------------------------------------------------

  tensorflow:
    image: tensorflow/serving:latest
    container_name: saas_tensorflow
    restart: unless-stopped
    # Attivare con: docker compose --profile ml up
    # Non si avvia nel normale `docker compose up` finché non ci sono modelli.
    profiles: ["ml"]
    environment:
      - MODEL_NAME=${TF_MODEL_NAME:-linkbay_model}
    volumes:
      - tensorflow_models:/models
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tensorflow.rule=Host(`tf.localhost`) || Host(`tf.linkbay-cms.com`)"
      - "traefik.http.routers.tensorflow.entrypoints=web"
      - "traefik.http.services.tensorflow.loadbalancer.server.port=8501"

networks:
  web:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  laravel_storage:
  nodered_data:
  tensorflow_models:
